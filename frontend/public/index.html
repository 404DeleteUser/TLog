<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charSet="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Trilha de Demandas</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/index.css" />
</head>
<body>
    
    <nav class="navbar">
        <div class="nav-left">
            <div class="logo-container">
                <img src="../assets/logo.png" alt="Logo" class="logo-img">
            </div>
            
            <a href="#" class="btn-trilha">Trilha</a>
            <button class="btn-add" id="btnNovaDemanda">+</button>
        </div>

        <div class="nav-right">
            <div class="user-profile">
                <img src="../assets/iconUser.png" alt="Perfil">
            </div>
        </div>
    </nav>

    <main class="container" id="muralContainer">
        <p style="color: #8b949e; padding-left: 20px;">A carregar demandas...</p>
    </main>

    <footer class="footer-container">
        <a class="footer-link footer-copyright" href="#">© 2026 Coordenadoria de Monitoramento de Pessoal</a>
    </footer>
    
    <div id="modalDemanda" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 class="modal-titulo">Novo Registro</h2>
            
            <form id="formDemanda">
                <div class="form-group">
                    <label>Categoria</label>
                    
                    <input type="hidden" id="categoria" name="categoria" required>

                    <div class="custom-select" id="customSelect">
                        <div class="select-trigger" id="selectTrigger">
                            <span>Selecione uma categoria...</span>
                            <img class="setinha" src="../assets/arrow-down.png" alt="">
                        </div>
                        
                        <div class="select-options hidden" id="selectOptions">
                            <div class="option" data-value="Email">Email</div>
                            <div class="option" data-value="SigPas">SigPas</div>
                            <div class="option" data-value="Processo">Processo</div>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição (Assunto)</label>
                    <input type="text" id="descricao" name="descricao" maxlength="150" required placeholder="Ex: Recadastramento de conta">
                </div>

                <div class="modal-actions">
                    <button type="button" id="btnCancelarModal" class="btn-cancelar">Cancelar</button>
                    <button type="submit" class="btn-salvar">Salvar Demanda</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/index.js"></script>
</body>
</html>
